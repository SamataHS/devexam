<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Minimal Full-Stack App</h1>

    <div class="card">
      <h2>Server Data</h2>
      <button onclick="fetchData()">Get Data from Server</button>
      <p id="data-result"></p>
    </div>

    <div class="card">
      <h2>Send Message</h2>
      <input type="text" id="message-input" placeholder="Enter a message">
      <button onclick="sendMessage()">Send</button>
      <p id="message-result"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
